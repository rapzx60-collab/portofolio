<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Detail Proyek | RapzzStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased min-w-[1280px] overflow-x-auto pt-24">

    <div id="loading-layar" class="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500">
        <i class="fas fa-robot text-gray-950 text-8xl mb-10 animate-bounce"></i>
        <div class="flex space-x-4">
            <div class="w-4 h-4 bg-gray-950 rounded-full animate-ping"></div>
            <div class="w-4 h-4 bg-gray-950 rounded-full animate-ping" style="animation-delay: 0.2s;"></div>
            <div class="w-4 h-4 bg-gray-950 rounded-full animate-ping" style="animation-delay: 0.4s;"></div>
        </div>
        <span class="text-gray-950 mt-10 text-sm font-black uppercase tracking-[0.5em] ml-2">Memuat Modul AI...</span>
    </div>

    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="flex justify-between items-center py-5 px-16 max-w-7xl mx-auto">
            <div class="text-2xl font-black tracking-tighter text-gray-950">Developer Modal Ai</div>
            <div class="flex items-center space-x-10 text-sm font-semibold text-gray-500">
                <a href="index.html" class="transisi-ai hover:text-gray-950 transition">Beranda</a>
                <a href="tentang.html" class="transisi-ai hover:text-gray-950 transition">Tentang</a>
                <a href="proyek.html" class="transisi-ai text-gray-950 transition font-bold">Proyek</a>
                <a href="blog.html" class="transisi-ai hover:text-gray-950 transition">Blog</a>
            </div>
            <a href="kontak.html" class="transisi-ai bg-gray-950 text-white px-7 py-3 rounded-full text-xs font-bold transition">Hubungi Saya</a>
        </div>
    </nav>

    <main id="root-detail" class="max-w-6xl mx-auto px-16 py-16">
        <div class="animate-pulse flex flex-col items-center">
            <div class="h-16 bg-gray-100 w-1/2 rounded mb-8"></div>
            <div class="h-[500px] bg-gray-100 w-full rounded-[50px]"></div>
        </div>
    </main>

    <div class="text-center pb-32">
        <a href="proyek.html" class="transisi-ai bg-gray-950 text-white px-12 py-6 rounded-full font-bold hover:bg-gray-800 transition text-xl inline-flex items-center shadow-lg">
           <i class="fas fa-arrow-left mr-4 text-xl"></i> Kembali ke Semua Proyek
        </a>
    </div>

    <script src="database-proyek.js"></script>

    <script>
        // ==========================================
        // FUNGSI LOADING SCREEN HANYA UNTUK PINDAH HALAMAN
        // ==========================================
        document.addEventListener('click', function(event) {
            const link = event.target.closest('a.transisi-ai');
            if (link) {
                if (event.ctrlKey || event.metaKey) return;
                event.preventDefault(); 
                const tujuanUrl = link.getAttribute('href');
                const layarLoading = document.getElementById('loading-layar');

                layarLoading.classList.remove('opacity-0', 'pointer-events-none');
                layarLoading.classList.add('opacity-100');

                setTimeout(() => {
                    window.location.href = tujuanUrl;
                }, 600);
            }
        });

        // ==========================================
        // FIX: MENGATASI STUCK SAAT TOMBOL KEMBALI (BACK)
        // ==========================================
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                const layarLoading = document.getElementById('loading-layar');
                if (layarLoading) {
                    layarLoading.classList.remove('opacity-100');
                    layarLoading.classList.add('opacity-0', 'pointer-events-none');
                }
            }
        });

        // ==========================================
        // LOGIKA RENDER DETAIL PROYEK
        // ==========================================
        const params = new URLSearchParams(window.location.search);
        const idProyek = params.get('id');
        const proyek = databaseProyek.find(p => p.id === idProyek);
        const root = document.getElementById('root-detail');

        if (proyek) {
            root.innerHTML = `
                <div class="text-center mb-16">
                    <h1 class="text-7xl font-black text-gray-900 leading-tight">${proyek.nama}</h1>
                </div>

                <div style="background-color: ${proyek.warna}" class="w-full h-[500px] rounded-[50px] flex items-center justify-center p-16 shadow-2xl mb-24 text-center relative border border-gray-100">
                    <div class="absolute top-0 left-0 w-full bg-white/90 backdrop-blur-sm h-16 flex items-center px-10 space-x-3 border-b border-gray-200 z-10 rounded-t-[50px]">
                        <div class="w-4 h-4 rounded-full bg-red-400"></div>
                        <div class="w-4 h-4 rounded-full bg-yellow-400"></div>
                        <div class="w-4 h-4 rounded-full bg-green-400"></div>
                    </div>
                    <h2 class="text-6xl lg:text-7xl font-black text-white leading-tight drop-shadow-lg mt-10">${proyek.nama}</h2>
                </div>

                <div class="max-w-5xl mx-auto flex flex-col space-y-24 text-center">
                    
                    <div class="flex flex-col items-center">
                        <h2 class="text-5xl font-black mb-8 text-gray-900">Tentang Proyek</h2>
                        <p class="text-gray-500 text-2xl leading-relaxed mb-12 max-w-4xl">${proyek.deskripsi}</p>
                        
                        <a href="${proyek.linkPreview}" target="_blank" class="bg-gray-950 text-white px-14 py-6 rounded-full font-bold flex items-center space-x-4 hover:bg-gray-800 transition shadow-xl text-xl">
                            <i class="fas fa-external-link-alt text-xl"></i>
                            <span>Buka Aplikasi Web</span>
                        </a>
                    </div>

                    <div class="grid grid-cols-3 gap-12 py-16 border-y border-gray-100">
                        <div>
                            <h4 class="text-sm font-black text-gray-400 uppercase tracking-widest mb-4">Klien</h4>
                            <p class="text-2xl font-bold text-gray-900">${proyek.klien}</p>
                        </div>
                        <div>
                            <h4 class="text-sm font-black text-gray-400 uppercase tracking-widest mb-4">Tanggal</h4>
                            <p class="text-2xl font-bold text-gray-900">${proyek.tanggal}</p>
                        </div>
                        <div>
                            <h4 class="text-sm font-black text-gray-400 uppercase tracking-widest mb-4">Layanan</h4>
                            <p class="text-2xl font-bold text-gray-900">${proyek.layanan}</p>
                        </div>
                    </div>

                    <div class="flex flex-col items-center">
                        <h2 class="text-5xl font-black mb-10 text-gray-900">Fitur Utama</h2>
                        <div class="flex flex-wrap justify-center gap-4 max-w-4xl">
                            ${proyek.fitur.map(f => `<span class="px-8 py-4 bg-gray-100 text-gray-700 rounded-full text-lg font-bold shadow-sm">${f}</span>`).join('')}
                        </div>
                    </div>

                </div>
            `;
            // Mengubah Judul Tab Browser
            document.title = `${proyek.nama} | RapzzStore`;
        } else {
            root.innerHTML = `<h1 class="text-center text-5xl font-bold text-gray-900">Proyek tidak ditemukan.</h1>`;
        }
    </script>
</body>
</html>
