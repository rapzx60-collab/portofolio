<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | InuuTyzDev</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@32,400,0,0" />
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        :root {
            var(--text-color): #ffffff;
            --text-color: #ffffff;
            --subheading-color: #cccccc;
            --placeholder-color: #aaaaaa;
            --primary-color: #0f0f23;
            --secondary-color: #1a1a2e;
            --secondary-hover-color: #252541;
            --scrollbar-color: #555555;
            --accent-color: #8B5CF6;
            --accent-secondary: #EC4899;
        }

        body {
            color: var(--text-color);
            background: var(--primary-color);
            transition: background 0.3s ease;
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            overflow-y: auto;
            padding: 32px 0 60px;
            height: calc(100vh - 127px);
            scrollbar-color: var(--scrollbar-color) transparent;
        }

        .container :where(.app-header, .suggestions, .message, .prompt-wrapper) {
            position: relative;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
            max-width: 990px;
        }

        .container .app-header { margin-top: 3vh; text-align: center; }

        .app-header .heading {
            font-size: 3rem;
            background: linear-gradient(to right, var(--accent-color), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .app-header .sub-heading { font-size: 1.5rem; color: var(--subheading-color); }

        .container .suggestions {
            width: 100%;
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 9.5vh;
        }

        body.chats-active .container :where(.app-header, .suggestions) { display: none; }

        .suggestions .suggestions-item {
            cursor: pointer;
            padding: 18px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border-radius: 16px;
            justify-content: space-between;
            background: var(--secondary-color);
            transition: 0.3s ease;
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .suggestions .suggestions-item:hover {
            background: var(--secondary-hover-color);
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(139, 92, 246, 0.3);
        }

        .suggestions .suggestions-item .text { font-size: 1rem; font-weight: 500; }
        .suggestions .suggestions-item .icon {
            width: 45px; height: 45px; display: flex; font-size: 1.4rem;
            align-self: flex-end; align-items: center; border-radius: 50%;
            justify-content: center; color: var(--accent-color); background: var(--primary-color);
        }
        .suggestions .suggestions-item:nth-child(2) .icon { color: var(--accent-secondary); }
        .suggestions .suggestions-item:nth-child(3) .icon { color: var(--accent-color); }
        .suggestions .suggestions-item:nth-child(4) .icon { color: var(--accent-secondary); }

        .container .chats-container { display: flex; gap: 20px; flex-direction: column; }

        /* PERBAIKAN BUG OVERFLOW PADA MESSAGE */
        .chats-container .message { 
            display: flex; gap: 11px; align-items: flex-start; 
            animation: messageAppear 0.3s ease-out; 
            max-width: 100%; 
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chats-container .bot-message { margin: 9px auto; width: 100%; }
        .chats-container .user-message { flex-direction: column; align-items: flex-end; width: 100%; }

        .chats-container .user-message .message-text {
            padding: 12px 16px; max-width: 85%;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-secondary));
            border-radius: 18px 18px 4px 18px; color: white;
            font-size: 13.5px; box-shadow: 0 4px 6px rgba(139, 92, 246, 0.2);
            /* Memaksa kata/url panjang untuk turun ke bawah */
            word-break: break-word; 
            overflow-wrap: anywhere; 
        }

        .container .prompt-container {
            position: fixed; width: 100%; left: 0; bottom: 0; padding: 16px 0;
            background: var(--primary-color); border-top: 1px solid var(--secondary-color);
            z-index: 10;
        }

        .prompt-container :where(.prompt-wrapper, .prompt-form, .prompt-actions) { display: flex; gap: 12px; height: 56px; align-items: center; }

        .prompt-container .prompt-form {
            height: 100%; width: 100%; border-radius: 28px; background: var(--secondary-color);
            border: 1px solid rgba(139, 92, 246, 0.2); transition: all 0.3s ease;
        }

        .prompt-form:focus-within { box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3); }

        .prompt-form .prompt-input {
            width: 100%; height: 100%; background: none; outline: none; border: none;
            font-size: 13.5px; color: var(--text-color); padding-left: 24px;
        }

        .prompt-form .prompt-input::placeholder { color: var(--placeholder-color); }

        .prompt-wrapper button {
            width: 56px; height: 100%; flex-shrink: 0; cursor: pointer; border-radius: 50%;
            font-size: 1.4rem; border: none; color: var(--text-color); background: var(--secondary-color);
            transition: 0.3s ease; border: 1px solid rgba(139, 92, 246, 0.2); display: flex;
            align-items: center; justify-content: center;
        }

        .prompt-wrapper button:hover { background: var(--secondary-hover-color); }

        .prompt-form .prompt-actions { margin-right: 7px; display: flex; align-items: center; justify-content: center; height: 100%; }
        
        .prompt-form .prompt-actions #send-prompt-btn {
            height: 45px; width: 45px;
            color: #fff; display: flex; background: linear-gradient(135deg, var(--accent-color), var(--accent-secondary));
        }

        .prompt-form #send-prompt-btn:hover { transform: scale(1.05); }

        .message-content {
            line-height: 1.6; font-size: 13.5px; color: var(--text-color); padding: 15px;
            background: var(--secondary-color); border-radius: 18px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.1); text-align: left;
            width: 100%;
            /* Memaksa kata/url panjang untuk turun ke bawah */
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .message-content p { margin-bottom: 12px; word-spacing: 0.5px; letter-spacing: 0.2px; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content strong { font-weight: 700; }
        .message-content em { font-style: italic; }
        
        .message-content ul, .message-content ol { margin: 10px 0; padding-left: 20px; }
        .message-content li { margin-bottom: 4px; padding-left: 4px; }
        .message-content code { background: rgba(139, 92, 246, 0.1); color: var(--accent-color); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.85em; }
        .message-content pre { 
            background: var(--primary-color); padding: 12px; border-radius: 8px; 
            margin: 12px 0; overflow-x: auto; border: 1px solid var(--secondary-hover-color); 
            max-width: 100%; 
        }
        .message-content pre code { background: none; padding: 0; font-family: monospace; color: var(--text-color); font-size: 12px; }

        .home-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000; width: 50px; height: 50px;
            border-radius: 50%; background: var(--secondary-color); border: 1px solid rgba(139, 92, 246, 0.2);
            color: var(--text-color); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); text-decoration: none;
        }
        .home-btn:hover { background: var(--secondary-hover-color); transform: scale(1.1); }

        .history-sidebar {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100vh;
            background: var(--primary-color); border-left: 1px solid var(--secondary-color);
            z-index: 2000; transition: right 0.3s ease; display: flex; flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        .history-sidebar.active { right: 0; }
        
        .sidebar-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; border-bottom: 1px solid var(--secondary-color);
        }
        .sidebar-header h3 { font-size: 1.1rem; color: var(--text-color); }
        .sidebar-header button {
            background: none; border: none; color: var(--text-color); cursor: pointer;
            font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
            padding: 5px; border-radius: 50%; transition: 0.2s;
        }
        .sidebar-header button:hover { background: var(--secondary-hover-color); }

        .session-list { list-style: none; overflow-y: auto; flex: 1; padding: 10px; }
        .session-item {
            padding: 12px 15px; margin-bottom: 8px; border-radius: 12px;
            background: var(--secondary-color); cursor: pointer; transition: 0.2s;
            border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center;
        }
        .session-item:hover { background: var(--secondary-hover-color); border-color: rgba(139, 92, 246, 0.3); }
        .session-item .session-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; }
        .session-item .delete-session { color: #ff4d4d; font-size: 1.2rem; cursor: pointer; padding: 5px; }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1500; display: none; opacity: 0; transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active { display: block; opacity: 1; }

        @media (max-width: 768px) {
            .container { padding: 20px 0 100px; }
            .app-header :is(.heading, .sub-heading) { font-size: 2rem; line-height: 1.4; }
            .app-header .sub-heading { font-size: 1.2rem; }
            .container .suggestions { grid-template-columns: 1fr; margin-top: 5vh; }
            .prompt-container :where(.prompt-wrapper, .prompt-form, .prompt-actions) { gap: 8px; height: 53px; }
            .prompt-container button { width: 53px; }
            .prompt-form .prompt-actions #send-prompt-btn { height: 42px; width: 42px; }
            .prompt-form .prompt-input { padding-left: 20px; font-size: 13px; }
            .message-content, .chats-container .user-message .message-text { font-size: 13px; }
            .home-btn { top: 15px; left: 15px; width: 45px; height: 45px; }
            .history-sidebar { width: 260px; right: -260px; }
        }
    </style>
</head>
<body>
    <a id="home-btn" class="home-btn" href="https://social-information.inuu.my.id">
        <span class="material-symbols-rounded">home</span>
    </a>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="history-sidebar" id="history-sidebar">
        <div class="sidebar-header">
            <h3>Riwayat Obrolan</h3>
            <button id="close-sidebar-btn" class="material-symbols-rounded">close</button>
        </div>
        <ul class="session-list" id="session-list">
        </ul>
    </div>

    <div class="container">
        <header class="app-header">
            <h1 class="heading">Halo, selamat datang!</h1>
            <h4 class="sub-heading">Ada yang bisa AI bantu?</h4>
        </header>

        <ul class="suggestions">
            <li class="suggestions-item">
                <p class="text">Apa cuaca hari ini?</p>
                <span class="icon material-symbols-rounded">cloud</span>
            </li>
            <li class="suggestions-item">
                <p class="text">Rekomendasi film terbaru</p>
                <span class="icon material-symbols-rounded">movie</span>
            </li>
            <li class="suggestions-item">
                <p class="text">Cara membuat kue bolu</p>
                <span class="icon material-symbols-rounded">cake</span>
            </li>
            <li class="suggestions-item">
                <p class="text">Tips belajar yang efektif</p>
                <span class="icon material-symbols-rounded">school</span>
            </li>
        </ul>

        <div class="chats-container"></div>

        <div class="prompt-container">
            <div class="prompt-wrapper">
                <form id="chat-form" class="prompt-form">
                    <input type="text" id="prompt-input" placeholder="Tanyakan sesuatu..." class="prompt-input" autocomplete="off" />
                    <div class="prompt-actions">
                        <button type="submit" id="send-prompt-btn" class="material-symbols-rounded">arrow_upward</button>
                    </div>
                </form>

                <button id="history-btn" class="material-symbols-rounded" title="Riwayat Sesi">history</button>
                <button id="new-chat-btn" class="material-symbols-rounded" title="Percakapan Baru">add</button>
            </div>
        </div>
    </div>

<script>
function formatAIResponse(text) {
    if (!text) return '';
    let formattedText = text;
    formattedText = formattedText.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, language, code) { return `<pre><code>${code.trim()}</code></pre>`; });
    formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    formattedText = formattedText.replace(/\*(.*?)\*/g, '<em>$1</em>');
    formattedText = formattedText.replace(/`([^`]+)`/g, '<code>$1</code>');
    formattedText = formattedText.replace(/\n/g, '<br>');
    return formattedText;
}

document.addEventListener('DOMContentLoaded', function() {
    const chatContainer = document.querySelector(".chats-container");
    const chatForm = document.getElementById("chat-form");
    const promptInput = document.getElementById("prompt-input");
    const suggestions = document.querySelectorAll(".suggestions-item");
    const newChatBtn = document.getElementById("new-chat-btn");
    
    const historyBtn = document.getElementById("history-btn");
    const sidebar = document.getElementById("history-sidebar");
    const overlay = document.getElementById("sidebar-overlay");
    const closeSidebarBtn = document.getElementById("close-sidebar-btn");
    const sessionList = document.getElementById("session-list");

    let currentSessionId = null; 
    let chatHistory = []; 
    const MAX_HISTORY = 6; 

    const scrollToBottom = () => { chatContainer.scrollTop = chatContainer.scrollHeight; };

    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;

        if (isUser) {
            messageDiv.innerHTML = `<div class="message-text">${text}</div>`;
        } else {
            const formattedText = formatAIResponse(text);
            messageDiv.innerHTML = `<div class="message-content">${formattedText}</div>`;
        }

        chatContainer.appendChild(messageDiv);
        scrollToBottom();
    }

    function getSessions() {
        return JSON.parse(localStorage.getItem('ai_sessions')) || [];
    }

    function saveSessions(sessions) {
        localStorage.setItem('ai_sessions', JSON.stringify(sessions));
        renderSessionList();
    }

    function saveCurrentSession() {
        if (chatHistory.length === 0) return;
        let sessions = getSessions();
        
        if (!currentSessionId) {
            currentSessionId = Date.now().toString(); 
            let firstMsg = chatHistory[0].text;
            let titleText = firstMsg.length > 25 ? firstMsg.substring(0, 25) + '...' : firstMsg;
            
            sessions.unshift({ id: currentSessionId, title: titleText, messages: [...chatHistory] });
        } else {
            let sessionIndex = sessions.findIndex(s => s.id === currentSessionId);
            if (sessionIndex !== -1) {
                sessions[sessionIndex].messages = [...chatHistory];
            }
        }
        saveSessions(sessions);
    }

    function loadSession(id) {
        const sessions = getSessions();
        const session = sessions.find(s => s.id === id);
        if (!session) return;

        currentSessionId = session.id;
        chatHistory = session.messages;

        chatContainer.innerHTML = ""; 
        document.body.classList.add("chats-active"); 
        
        chatHistory.forEach(msg => {
            addMessage(msg.text, msg.type === 'user');
        });

        closeSidebar();
    }

    function renderSessionList() {
        const sessions = getSessions();
        sessionList.innerHTML = '';
        
        if(sessions.length === 0) {
            sessionList.innerHTML = '<li style="text-align:center; color:#888; margin-top:20px; font-size:13px;">Belum ada riwayat obrolan.</li>';
            return;
        }

        sessions.forEach(session => {
            const li = document.createElement('li');
            li.className = 'session-item';
            
            // Klik diletakkan di li untuk memudahkan user menekan layar
            li.onclick = () => loadSession(session.id);
            
            const titleSpan = document.createElement('span');
            titleSpan.className = 'session-title';
            titleSpan.textContent = session.title;
            
            const deleteSpan = document.createElement('span');
            deleteSpan.className = 'delete-session material-symbols-rounded';
            deleteSpan.textContent = 'delete';
            deleteSpan.onclick = (e) => {
                e.stopPropagation(); // Mencegah sesi terbuka saat klik hapus
                let updatedSessions = getSessions().filter(s => s.id !== session.id);
                saveSessions(updatedSessions);
                if(currentSessionId === session.id) newChatBtn.click(); 
            };

            li.appendChild(titleSpan);
            li.appendChild(deleteSpan);
            sessionList.appendChild(li);
        });
    }

    async function sendMessage(message) {
        if (!message) return;

        document.body.classList.add("chats-active");
        addMessage(message, true);
        
        chatHistory.push({ type: 'user', text: message });
        saveCurrentSession();

        promptInput.value = "";

        const typingDiv = document.createElement("div");
        typingDiv.className = "message bot-message";
        typingDiv.innerHTML = '<div class="message-content">Mengetik...</div>';
        chatContainer.appendChild(typingDiv);
        scrollToBottom();

        try {
            let recentHistory = chatHistory.slice(-MAX_HISTORY);
            let promptText = recentHistory.map(msg => 
                msg.type === 'user' ? `User: ${msg.text}` : `AI: ${msg.text}`
            ).join("\n");
            
            const promptWithMemory = `Riwayat percakapan:\n${promptText}\n\nAI:`;

            const apiUrl = `https://api.siputzx.my.id/api/ai/gemini?text=${encodeURIComponent(promptWithMemory)}&cookie=smart&promptsystem=Kamu adalah ai pintar yang menjawab pertanyaan dengan singkat.`;

            const response = await fetch(apiUrl);
            
            const rawText = await response.text(); 
            
            let data;
            try {
                data = JSON.parse(rawText); 
            } catch (parseError) {
                let serverReply = rawText.substring(0, 300).replace(/</g, "&lt;").replace(/>/g, "&gt;");
                throw new Error("Server membalas dengan HTML:<br><br><code>" + serverReply + "</code>");
            }

            chatContainer.removeChild(typingDiv);

            let aiResponseText = "Tidak ada respon dari API.";
            
            if (data && data.status === true && data.data && data.data.response) {
                aiResponseText = data.data.response;
            } else if (data.result) aiResponseText = data.result;
            else if (data.response) aiResponseText = data.response;
            else if (data.message) aiResponseText = data.message;
            else if (typeof data === 'string') aiResponseText = data;

            chatHistory.push({ type: 'ai', text: aiResponseText });
            saveCurrentSession();

            addMessage(aiResponseText, false);

        } catch (error) {
            chatContainer.removeChild(typingDiv);
            addMessage(`Gagal menghubungi server: ${error.message}`, false);
            chatHistory.pop(); 
        }
    }

    chatForm.addEventListener('submit', function(e) {
        e.preventDefault(); 
        const text = promptInput.value.trim();
        sendMessage(text);
    });

    suggestions.forEach(suggestion => {
        suggestion.addEventListener('click', function() {
            const text = this.querySelector('.text').textContent;
            sendMessage(text);
        });
    });

    newChatBtn.addEventListener('click', () => {
        chatContainer.innerHTML = ""; 
        document.body.classList.remove("chats-active"); 
        promptInput.value = "";
        
        currentSessionId = null; 
        chatHistory = []; 

        setTimeout(() => { addMessage("Sesi baru dimulai. Ada yang bisa saya bantu?", false); }, 500);
    });

    function openSidebar() {
        sidebar.classList.add('active');
        overlay.classList.add('active');
        renderSessionList();
    }
    function closeSidebar() {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
    }

    historyBtn.addEventListener('click', openSidebar);
    closeSidebarBtn.addEventListener('click', closeSidebar);
    overlay.addEventListener('click', closeSidebar);

    renderSessionList();
    setTimeout(() => { addMessage("Halo! Saya AI Assistant. Ada yang bisa saya bantu?", false); }, 1000);
});
</script>
</body>
</html>
