<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Baca Artikel | RapzzStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* CSS KHUSUS UNTUK MEMBESARKAN TEKS DARI DATABASE */
        .artikel-body p { font-size: 1.5rem; line-height: 1.8; margin-bottom: 2rem; color: #4B5563; } /* text-2xl */
        .artikel-body h3 { font-size: 2.25rem; font-weight: 900; margin-top: 3.5rem; margin-bottom: 1.5rem; color: #111827; } /* text-4xl */
        .artikel-body ul { font-size: 1.5rem; line-height: 1.8; list-style-type: disc; padding-left: 2.5rem; margin-bottom: 2rem; color: #4B5563; }
        .artikel-body li { margin-bottom: 1rem; }
        .artikel-body code { background-color: #F3F4F6; padding: 0.25rem 0.5rem; border-radius: 0.5rem; font-size: 1.25rem; color: #EF4444; }
        .artikel-body strong { color: #111827; font-weight: 800; }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased min-w-[1280px] overflow-x-auto pt-24">

    <div id="loading-layar" class="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500">
        <i class="fas fa-robot text-gray-950 text-8xl mb-10 animate-bounce"></i>
        <div class="flex space-x-4">
            <div class="w-4 h-4 bg-gray-950 rounded-full animate-ping"></div>
            <div class="w-4 h-4 bg-gray-950 rounded-full animate-ping" style="animation-delay: 0.2s;"></div>
            <div class="w-4 h-4 bg-gray-950 rounded-full animate-ping" style="animation-delay: 0.4s;"></div>
        </div>
        <span class="text-gray-950 mt-10 text-sm font-black uppercase tracking-[0.5em] ml-2">Memuat Modul</span>
    </div>

    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="flex justify-between items-center py-5 px-16 max-w-7xl mx-auto">
            <div class="text-2xl font-black tracking-tighter text-gray-950">Developer</div>
            <div class="flex items-center space-x-10 text-sm font-semibold text-gray-500">
                <a href="index.html" class="transisi-ai hover:text-gray-950 transition">Beranda</a>
                <a href="tentang.html" class="transisi-ai hover:text-gray-950 transition">Tentang</a>
                <a href="proyek.html" class="transisi-ai hover:text-gray-950 transition">Proyek</a>
                <a href="blog.html" class="transisi-ai hover:text-gray-950 transition font-bold">Blog</a>
            </div>
            <a href="kontak.html" class="transisi-ai bg-gray-950 text-white px-7 py-3 rounded-full text-xs font-bold transition shadow-sm">Hubungi Saya</a>
        </div>
    </nav>

    <main id="root-artikel" class="max-w-5xl mx-auto px-16 py-24">
        <div class="animate-pulse flex flex-col items-center">
             <div class="h-6 w-32 bg-gray-100 mb-6"></div>
             <div class="h-16 w-3/4 bg-gray-100 mb-12"></div>
             <div class="h-[500px] w-full bg-gray-100 rounded-[50px]"></div>
        </div>
    </main>

    <div class="text-center pb-32">
        <a href="blog.html" class="transisi-ai inline-flex items-center space-x-4 bg-gray-950 text-white px-12 py-6 rounded-full font-bold hover:bg-gray-800 transition text-xl shadow-lg">
            <i class="fas fa-arrow-left text-xl"></i>
            <span>Kembali ke Blog</span>
        </a>
    </div>

    <script src="database-blog.js"></script>

    <script>
        // ==========================================
        // FUNGSI LOADING SCREEN HANYA UNTUK PINDAH HALAMAN
        // ==========================================
        document.addEventListener('click', function(event) {
            const link = event.target.closest('a.transisi-ai');
            if (link) {
                if (event.ctrlKey || event.metaKey) return;
                event.preventDefault(); 
                const tujuanUrl = link.getAttribute('href');
                const layarLoading = document.getElementById('loading-layar');

                layarLoading.classList.remove('opacity-0', 'pointer-events-none');
                layarLoading.classList.add('opacity-100');

                setTimeout(() => {
                    window.location.href = tujuanUrl;
                }, 600);
            }
        });

        // ==========================================
        // FIX: MENGATASI STUCK SAAT TOMBOL KEMBALI (BACK)
        // ==========================================
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                const layarLoading = document.getElementById('loading-layar');
                if (layarLoading) {
                    layarLoading.classList.remove('opacity-100');
                    layarLoading.classList.add('opacity-0', 'pointer-events-none');
                }
            }
        });

        // ==========================================
        // LOGIKA RENDER ARTIKEL
        // ==========================================
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const post = databaseBlog.find(p => p.id === id);
        const root = document.getElementById('root-artikel');

        if (post) {
            root.innerHTML = `
                <div class="text-center mb-20">
                    <span class="text-xl font-black text-gray-400 uppercase tracking-[0.3em]">${post.kategori}</span>
                    <h1 class="text-6xl md:text-7xl font-black text-gray-900 mt-8 mb-12 leading-tight">${post.judulArtikel}</h1>
                    <div class="flex justify-center items-center space-x-6 text-xl font-bold text-gray-400 uppercase tracking-widest">
                        <span>Oleh Danendra N Rs</span>
                        <span class="text-gray-200">|</span>
                        <span>${post.tanggal}</span>
                        <span class="text-gray-200">|</span>
                        <span>${post.durasi}</span>
                    </div>
                </div>

                <div style="background-color: ${post.warna}" class="w-full h-[500px] rounded-[50px] flex items-center justify-center p-16 shadow-2xl mb-24 text-center">
                    <h2 class="text-6xl md:text-7xl font-black text-white leading-tight drop-shadow-lg">${post.judulBanner}</h2>
                </div>

                <article class="max-w-4xl mx-auto">
                    <p class="text-3xl mb-16 font-semibold text-gray-800 leading-relaxed border-l-8 border-gray-900 pl-8">${post.deskripsi}</p>
                    
                    <div class="artikel-body">
                        ${post.isi}
                    </div>
                </article>

                <div class="mt-32 pt-12 border-t border-gray-100 flex flex-col md:flex-row justify-between items-center gap-8 max-w-4xl mx-auto">
                    <span class="text-2xl font-bold text-gray-900 uppercase tracking-widest">Bagikan Artikel</span>
                    <div class="flex space-x-8 text-gray-400">
                        <a href="#" class="hover:text-gray-950 transition text-4xl"><i class="fab fa-twitter"></i></a>
                        <a href="#" class="hover:text-gray-950 transition text-4xl"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="hover:text-gray-950 transition text-4xl"><i class="fab fa-linkedin-in"></i></a>
                        <a href="#" class="hover:text-gray-950 transition text-4xl"><i class="fas fa-link"></i></a>
                    </div>
                </div>
            `;
            // Mengubah judul halaman browser sesuai judul artikel
            document.title = `${post.judulArtikel} | RapzzStore`;
        } else {
            root.innerHTML = `<h1 class="text-center text-5xl font-bold py-32 text-gray-900">Artikel tidak ditemukan.</h1>`;
        }
    </script>
</body>
</html>
